<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In | POWAI</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ivory': '#F8FAFC',
                        'vellum': '#F1F4F6',
                        'slate-ink': '#1E293B',
                        'slate-muted': '#64748B',
                        'accent-midnight': '#1E293B',
                        'powai-blue': '#1E293B', // Updated to deep midnight blue as per design system
                        'surface-container': '#F1F4F6',
                    },
                    fontFamily: {
                        'sans': ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    borderRadius: {
                        'none': '0',
                        'sm': '0.125rem',
                        'DEFAULT': '0.125rem', // Match ROUND_FOUR (minimalist)
                        'md': '0.25rem',
                        'lg': '0.375rem',
                        'xl': '0.5rem',
                        '2xl': '0.75rem',
                        '3xl': '1rem',
                        'full': '9999px',
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }
        body {
            background-color: #F8FAFC;
            color: #1E293B;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .form-input:focus {
            ring-color: #1E293B;
            border-color: #1E293B;
        }
        /* Subtle dot background from SCREEN_10 logic - reduced opacity */
        .subtle-dot-bg {
            background-image: radial-gradient(#abb3b7 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            opacity: 0.05;
        }
    </style>
</head>
<body class="min-h-screen relative overflow-hidden flex flex-col md:flex-row">
<!-- Moving Dots Background Animation -->
<canvas class="fixed top-0 left-0 w-full h-full -z-20 pointer-events-none" id="dotCanvas"></canvas>
<!-- Decorative dot background pattern -->
<div class="absolute inset-0 subtle-dot-bg -z-10 pointer-events-none"></div>
<!-- Left Half: Branding & Stats -->
<div class="hidden md:flex flex-1 flex-col justify-center px-16 lg:px-24 xl:px-32 z-10">
<div class="mb-10">
<div class="w-14 h-14 bg-accent-midnight rounded-lg flex items-center justify-center text-white mb-8 shadow-sm overflow-hidden">
<img src="../public/pow.png" alt="POWAI Logo" class="w-full h-full object-contain"/>
</div>
<h1 class="text-4xl lg:text-5xl font-extrabold tracking-tight text-slate-ink mb-6">
                Welcome to POWAI
            </h1>
<p class="text-lg text-slate-muted max-w-md leading-relaxed mb-12">
                The proof-of-work academic integrity system that verifies effort, not just output. Track, analyze, and verify authentic student work.
            </p>
<div class="grid grid-cols-3 gap-8">
<div>
<div class="text-2xl font-bold text-slate-ink">99%</div>
<div class="text-xs font-bold uppercase tracking-widest text-slate-muted mt-1">Accuracy</div>
</div>
<div>
<div class="text-2xl font-bold text-slate-ink">10K+</div>
<div class="text-xs font-bold uppercase tracking-widest text-slate-muted mt-1">Verified</div>
</div>
<div>
<div class="text-2xl font-bold text-slate-ink">&lt;2s</div>
<div class="text-xs font-bold uppercase tracking-widest text-slate-muted mt-1">Analysis</div>
</div>
</div>
</div>
</div>
<!-- Right Half: Sign In Form -->
<div class="flex-1 flex flex-col justify-center items-center px-6 py-12 md:px-0 z-10">
<div class="w-full max-w-md space-y-8 bg-white/50 backdrop-blur-sm p-8 md:p-10 rounded-2xl border border-slate-200/50 shadow-sm">
<div>
<h2 class="text-3xl font-bold text-slate-ink">Sign in</h2>
<p class="text-slate-muted mt-2">Welcome back. Enter your details.</p>
</div>
<form class="space-y-6">
<div>
<label class="block text-sm font-semibold text-slate-ink mb-2" for="email">Email</label>
<input class="w-full px-4 py-3 bg-white border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-slate-ink/5 focus:border-slate-ink transition-all placeholder:text-slate-400 outline-none" id="email" placeholder="you@example.com" type="email"/>
</div>
<div>
<label class="block text-sm font-semibold text-slate-ink mb-2" for="password">Password</label>
<input class="w-full px-4 py-3 bg-white border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-slate-ink/5 focus:border-slate-ink transition-all placeholder:text-slate-400 outline-none" id="password" placeholder="••••••••" type="password"/>
</div>
<div>
<label class="block text-sm font-semibold text-slate-ink mb-3">Role</label>
<div class="flex gap-4">
<button class="flex-1 py-3 px-4 rounded-lg border-2 border-slate-ink bg-slate-ink text-white text-sm font-semibold transition-all" id="role-teacher" onclick="toggleRole('teacher')" type="button">
                            Teacher
                        </button>
<button class="flex-1 py-3 px-4 rounded-lg border-2 border-slate-100 bg-white text-slate-muted text-sm font-semibold hover:border-slate-200 transition-all" id="role-student" onclick="toggleRole('student')" type="button">
                            Student
                        </button>
</div>
</div>
<button class="w-full bg-accent-midnight text-white py-4 rounded-lg font-bold text-sm transition-all hover:opacity-90 active:scale-[0.98] shadow-sm" type="submit">
                    Sign in
                </button>
</form>
<p class="text-center text-sm text-slate-muted">
                Don't have an account? <a class="text-slate-ink font-semibold hover:underline" href="#">Sign up</a>
</p>
</div>
</div>
<!-- Mobile Header -->
<header class="absolute top-0 left-0 w-full p-8 md:hidden">
<div class="text-xl font-extrabold tracking-tighter text-slate-ink uppercase">POWAI</div>
</header>
<script>
        // Toggle Functionality
        function toggleRole(role) {
            const teacherBtn = document.getElementById('role-teacher');
            const studentBtn = document.getElementById('role-student');
            
            if (role === 'teacher') {
                teacherBtn.classList.add('border-slate-ink', 'bg-slate-ink', 'text-white');
                teacherBtn.classList.remove('border-slate-100', 'bg-white', 'text-slate-muted');
                
                studentBtn.classList.add('border-slate-100', 'bg-white', 'text-slate-muted');
                studentBtn.classList.remove('border-slate-ink', 'bg-slate-ink', 'text-white');
            } else {
                studentBtn.classList.add('border-slate-ink', 'bg-slate-ink', 'text-white');
                studentBtn.classList.remove('border-slate-100', 'bg-white', 'text-slate-muted');
                
                teacherBtn.classList.add('border-slate-100', 'bg-white', 'text-slate-muted');
                teacherBtn.classList.remove('border-slate-ink', 'bg-slate-ink', 'text-white');
            }
        }

        // Enhanced Background Animation - Opacity increased slightly for better visibility
        (function() {
            const canvas = document.getElementById('dotCanvas');
            const ctx = canvas.getContext('2d');
            let dots = [];
            const dotCount = 150; 

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            window.addEventListener('resize', resize);
            resize();

            class Dot {
                constructor() {
                    this.init();
                }
                init() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.4; 
                    this.vy = (Math.random() - 0.5) * 0.4; 
                    this.radius = Math.random() * 1.5 + 0.5; 
                    // Increased opacity from 0.05-0.20 to 0.15-0.30 for slightly better visibility
                    this.opacity = Math.random() * 0.15 + 0.15; 
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;

                    if (this.x < 0) this.x = canvas.width;
                    if (this.x > canvas.width) this.x = 0;
                    if (this.y < 0) this.y = canvas.height;
                    if (this.y > canvas.height) this.y = 0;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(30, 41, 59, ${this.opacity})`; // Using theme ink color
                    ctx.fill();
                }
            }

            for (let i = 0; i < dotCount; i++) {
                dots.push(new Dot());
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                dots.forEach(dot => {
                    dot.update();
                    dot.draw();
                });
                requestAnimationFrame(animate);
            }
            animate();
        })();
    </script>
</body></html>
